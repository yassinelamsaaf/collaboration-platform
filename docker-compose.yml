services:
  db:
    image: postgres:16-alpine
    container_name: cp-postgres
    environment:
      POSTGRES_DB: CP
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cp_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: cp-redis
    ports:
      - "6379:6379"

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: cp-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cp-server
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
      - mailhog

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: cp-client
    environment:
      CLIENT_API_BASE_URL: ${CLIENT_API_BASE_URL:-http://localhost:8080/api}
    ports:
      - "${CLIENT_PORT:-4200}:80"
    depends_on:
      - server

volumes:
  cp_postgres_data:
