spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
    show-sql: ${SPRING_JPA_SHOW_SQL}

  # Redis connection
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST}
      port: ${SPRING_DATA_REDIS_PORT}
      # password: ${SPRING_DATA_REDIS_PASSWORD}

  # Gmail SMTP config
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    # Use a Gmail App Password, NOT your real password
    # Go to: Google Account > Security > 2FA > App Passwords
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

# Custom app properties
app:
  mail:
    from: ${APP_MAIL_FROM:no-reply@collaboration-platform.local}
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
  jwt:
    secret: ${APP_JWT_SECRET}
    access-token-expiration: ${APP_JWT_ACCESS_TOKEN_EXPIRATION}
    refresh-token-expiration: ${APP_JWT_REFRESH_TOKEN_EXPIRATION}
  frontend-url: ${APP_FRONTEND_URL}
  email-verification-expiry-hours: ${APP_EMAIL_VERIFICATION_EXPIRY_HOURS}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS}
