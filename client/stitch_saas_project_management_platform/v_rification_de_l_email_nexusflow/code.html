<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
        }
        .code-input-container {
            display: flex;
            gap: theme('spacing.sm');
            justify-content: center;
            margin-bottom: theme('spacing.xl');
        }
        .code-input {
            width: 48px;
            height: 56px;
            text-align: center;
            border: 1px solid theme('colors.outline-variant');
            border-radius: theme('borderRadius.DEFAULT');
            background-color: theme('colors.surface-container-lowest');
            color: theme('colors.on-surface');
            font-size: 24px;
            font-weight: 600;
        }
        .code-input:focus {
            outline: none;
            border-color: theme('colors.secondary');
            box-shadow: 0 0 0 2px theme('colors.secondary-fixed');
        }
    </style>

<body class="min-h-screen flex items-center justify-center p-md bg-surface-container-low">
<main class="w-full max-w-md bg-surface-container-lowest border border-outline-variant rounded-lg p-xl flex flex-col items-center text-center">
<!-- Brand Logo / Icon -->
<div class="mb-lg h-16 w-16 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container">
<span class="material-symbols-outlined" data-icon="mark_email_read" data-weight="fill" style="font-size: 32px;">mark_email_read</span>
</div>
<!-- Header -->
<h1 class="font-headline-md text-headline-md text-on-surface mb-sm">Verify your email</h1>
<p class="font-body-base text-body-base text-on-surface-variant mb-xl">
            We've sent a 6-digit verification code to your email. Please enter it below to activate your account.
        </p>
<!-- Verification Form -->
<form class="w-full flex flex-col items-center" id="verificationForm">
<div class="code-input-container w-full" id="codeInputGroup">
<input aria-label="Digit 1" autofocus="" class="code-input" maxlength="1" type="text"/>
<input aria-label="Digit 2" class="code-input" maxlength="1" type="text"/>
<input aria-label="Digit 3" class="code-input" maxlength="1" type="text"/>
<input aria-label="Digit 4" class="code-input" maxlength="1" type="text"/>
<input aria-label="Digit 5" class="code-input" maxlength="1" type="text"/>
<input aria-label="Digit 6" class="code-input" maxlength="1" type="text"/>
</div>
<!-- Primary Action -->
<button class="w-full bg-secondary text-on-secondary font-label-md text-label-md rounded py-sm px-md flex items-center justify-center gap-xs hover:bg-secondary/90 transition-colors mb-lg h-[40px]" id="verifyBtn" type="button">
                Verify Account
            </button>
<!-- Secondary Action -->
<div class="font-body-sm text-body-sm text-on-surface-variant">
                Didn't receive the code? 
                <button class="text-secondary hover:underline font-label-sm text-label-sm ml-xs bg-transparent border-none cursor-pointer" type="button">
                    Resend code
                </button>
</div>
</form>
</main>
<script>
        // Simple script for code input auto-advance
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.code-input');
            
            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    // Allow only numbers
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    
                    if (e.target.value.length === 1 && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                        inputs[index - 1].focus();
                    }
                });
            });

            // Handle paste event
            document.getElementById('codeInputGroup').addEventListener('paste', (e) => {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text').slice(0, 6).replace(/[^0-9]/g, '');
                
                if (pasteData) {
                    for (let i = 0; i < pasteData.length; i++) {
                        if (inputs[i]) {
                            inputs[i].value = pasteData[i];
                        }
                    }
                    // Focus last filled input or first empty
                    const focusIndex = Math.min(pasteData.length, 5);
                    inputs[focusIndex].focus();
                }
            });

            // Simulate Verification Click
            document.getElementById('verifyBtn').addEventListener('click', function() {
                const btn = this;
                const originalText = btn.innerHTML;
                btn.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-size: 18px;">progress_activity</span> Verifying...';
                btn.classList.add('opacity-80', 'cursor-not-allowed');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('opacity-80', 'cursor-not-allowed');
                    // In a real app, redirect here
                }, 1500);
            });
        });
    </script>
