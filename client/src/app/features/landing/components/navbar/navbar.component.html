<header class="landing-header">
  <div class="landing-brand">
    <div class="landing-brand__mark">CP</div>
    <div class="landing-brand__text">Collaboration Platform</div>
  </div>

  <nav class="landing-nav">
    <a
      class="landing-nav__link"
      href="#features"
      (click)="scrollToSection('features'); $event.preventDefault()"
    >
      Features
    </a>
    <a
      class="landing-nav__link"
      href="#workflow"
      (click)="scrollToSection('workflow'); $event.preventDefault()"
    >
      Workflow
    </a>
    <a
      class="landing-nav__link"
      href="#pricing"
      (click)="scrollToSection('pricing'); $event.preventDefault()"
    >
      Pricing
    </a>
  </nav>

  <div class="landing-actions">
    <button class="btn btn--ghost" type="button" (click)="scrollToSection('contact')">
      Contact Us
    </button>

    <div class="profile-menu" *ngIf="profile; else loginButton">
      <button class="profile-button" type="button" (click)="toggleMenu()">
        <span class="profile-button__badge">{{ initials }}</span>
        <span class="profile-button__label">{{ displayName }}</span>
        <lucide-icon name="chevron-down"></lucide-icon>
      </button>
      <div class="profile-dropdown" [class.is-open]="menuOpen">
        <button class="profile-dropdown__item" type="button">
          <lucide-icon name="layout-dashboard"></lucide-icon>
          Dashboard
        </button>
        <button class="profile-dropdown__item" type="button">
          <lucide-icon name="settings"></lucide-icon>
          Settings
        </button>
        <button class="profile-dropdown__item" type="button" (click)="onLogout()" [disabled]="loading">
          <lucide-icon name="log-out"></lucide-icon>
          Log out
        </button>
        <span class="profile-error" *ngIf="errorMessage">{{ errorMessage }}</span>
      </div>
    </div>

    <ng-template #loginButton>
      <button class="btn btn--primary" type="button" (click)="onLogin()">
        Log In
        <lucide-icon name="arrow-right"></lucide-icon>
      </button>
    </ng-template>
  </div>

  <button
    class="landing-menu-toggle"
    type="button"
    *ngIf="!profile; else profileToggle"
    (click)="toggleMobileMenu()"
  >
    <lucide-icon name="menu"></lucide-icon>
  </button>
  <ng-template #profileToggle>
    <button class="landing-menu-toggle is-profile" type="button" (click)="toggleMobileMenu()">
      <span class="profile-button__badge">{{ initials }}</span>
      <lucide-icon name="chevron-down"></lucide-icon>
    </button>
  </ng-template>
</header>

<div class="landing-mobile" [class.is-open]="mobileMenuOpen">
  <button class="landing-mobile__overlay" type="button" (click)="closeMobileMenu()"></button>
  <aside class="landing-mobile__panel">
    <div class="landing-mobile__header">
      <div class="landing-brand">
        <div class="landing-brand__mark">CP</div>
        <div class="landing-brand__text">Collaboration Platform</div>
      </div>
      <button class="landing-mobile__close" type="button" (click)="closeMobileMenu()">
        <lucide-icon name="x"></lucide-icon>
      </button>
    </div>

    <nav class="landing-mobile__nav">
      <a
        class="landing-mobile__link"
        href="#features"
        (click)="scrollToSection('features'); $event.preventDefault()"
      >
        Features
      </a>
      <a
        class="landing-mobile__link"
        href="#workflow"
        (click)="scrollToSection('workflow'); $event.preventDefault()"
      >
        Workflow
      </a>
      <a
        class="landing-mobile__link"
        href="#pricing"
        (click)="scrollToSection('pricing'); $event.preventDefault()"
      >
        Pricing
      </a>
      <a
        class="landing-mobile__link"
        href="#contact"
        (click)="scrollToSection('contact'); $event.preventDefault()"
      >
        Contact
      </a>
    </nav>

    <div class="landing-mobile__divider"></div>

    <ng-container *ngIf="profile; else mobileLoggedOut">
      <div class="landing-mobile__profile">
        <span class="profile-button__badge">{{ initials }}</span>
        <div>
          <div class="landing-mobile__name">{{ displayName }}</div>
          <div class="landing-mobile__meta">Logged in</div>
        </div>
      </div>
      <button class="landing-mobile__item" type="button">
        <lucide-icon name="layout-dashboard"></lucide-icon>
        Dashboard
      </button>
      <button class="landing-mobile__item" type="button">
        <lucide-icon name="settings"></lucide-icon>
        Settings
      </button>
      <button class="landing-mobile__item" type="button" (click)="onLogout()" [disabled]="loading">
        <lucide-icon name="log-out"></lucide-icon>
        Log out
      </button>
      <span class="profile-error" *ngIf="errorMessage">{{ errorMessage }}</span>
    </ng-container>

    <ng-template #mobileLoggedOut>
      <button class="landing-mobile__item" type="button" (click)="onLogin()">
        <lucide-icon name="log-in"></lucide-icon>
        Log In
      </button>
    </ng-template>
  </aside>
</div>
