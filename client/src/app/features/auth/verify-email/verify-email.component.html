<section class="page">
  <div class="page-card">
    <div class="page-header">
      <h1 class="page-title">Verify email</h1>
      <p class="page-subtitle">Enter the 6-digit code sent to your inbox.</p>
    </div>

    <app-alert type="success" [message]="successMessage" />
    <app-alert type="error" [message]="errorMessage" />

    <form class="form-grid" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-field">
        <label class="form-label" for="email">Email</label>
        <input
          id="email"
          type="email"
          class="input"
          [class.is-invalid]="emailError"
          formControlName="email"
          autocomplete="email"
        />
        <span class="form-error" *ngIf="emailError">{{ emailError }}</span>
      </div>

      <div class="form-field">
        <label class="form-label" for="code">Verification code</label>
        <input
          id="code"
          type="text"
          class="input"
          [class.is-invalid]="codeError"
          formControlName="code"
          autocomplete="one-time-code"
          inputmode="numeric"
          maxlength="6"
        />
        <span class="form-error" *ngIf="codeError">{{ codeError }}</span>
      </div>

      <div class="inline-action">
        <button class="button" type="submit" [disabled]="loading">
          Verify email
        </button>
        <button
          class="link-button"
          type="button"
          [disabled]="resending"
          (click)="onResend()"
        >
          Resend verification code?
        </button>
      </div>

      <span class="loading-text" *ngIf="loading">Verifying your code...</span>
      <span class="loading-text" *ngIf="resending">Sending a new code...</span>
    </form>

    <div class="auth-footer">
      <span class="muted">Already verified?</span>
      <a class="link" routerLink="/auth/login">Sign in</a>
    </div>
  </div>
</section>
