<section class="auth-center">
  <div class="auth-card">
    <div class="auth-card__icon">
      <lucide-icon class="email-verif-icon" name="mail"></lucide-icon>
    </div>
    <h1 class="auth-card__title">Set new password</h1>
    <p class="auth-card__subtitle">
      Enter the verification code sent to your email, then choose a new password.
    </p>

    <form class="form-stack" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-field" *ngIf="!form.get('email')?.value">
        <label class="form-label" for="reset-email">Email Address</label>
        <input
          id="reset-email"
          type="email"
          class="input"
          formControlName="email"
          autocomplete="email"
        />
        <span class="form-error" *ngIf="emailError">{{ emailError }}</span>
      </div>

      <div class="form-field">
        <label class="form-label">Verification Code</label>
        <div class="otp-grid" role="group" aria-label="Verification code" (paste)="onOtpPaste($event)">
          <input
            #otpInput
            class="otp-input"
            type="text"
            inputmode="numeric"
            maxlength="1"
            formControlName="code1"
            [class.is-filled]="form.get('code1')?.value"
            (input)="onOtpInput(0, $event)"
            (keydown)="onOtpKeydown(0, $event)"
          />
          <input
            #otpInput
            class="otp-input"
            type="text"
            inputmode="numeric"
            maxlength="1"
            formControlName="code2"
            [class.is-filled]="form.get('code2')?.value"
            (input)="onOtpInput(1, $event)"
            (keydown)="onOtpKeydown(1, $event)"
          />
          <input
            #otpInput
            class="otp-input"
            type="text"
            inputmode="numeric"
            maxlength="1"
            formControlName="code3"
            [class.is-filled]="form.get('code3')?.value"
            (input)="onOtpInput(2, $event)"
            (keydown)="onOtpKeydown(2, $event)"
          />
          <input
            #otpInput
            class="otp-input"
            type="text"
            inputmode="numeric"
            maxlength="1"
            formControlName="code4"
            [class.is-filled]="form.get('code4')?.value"
            (input)="onOtpInput(3, $event)"
            (keydown)="onOtpKeydown(3, $event)"
          />
          <input
            #otpInput
            class="otp-input"
            type="text"
            inputmode="numeric"
            maxlength="1"
            formControlName="code5"
            [class.is-filled]="form.get('code5')?.value"
            (input)="onOtpInput(4, $event)"
            (keydown)="onOtpKeydown(4, $event)"
          />
          <input
            #otpInput
            class="otp-input"
            type="text"
            inputmode="numeric"
            maxlength="1"
            formControlName="code6"
            [class.is-filled]="form.get('code6')?.value"
            (input)="onOtpInput(5, $event)"
            (keydown)="onOtpKeydown(5, $event)"
          />
        </div>
        <span class="form-error" *ngIf="codeError">{{ codeError }}</span>
      </div>

      <div class="form-field">
        <label class="form-label" for="new-password">New Password</label>
        <div class="input-with-icon">
          <lucide-icon name="shield-check"></lucide-icon>
          <input
            id="new-password"
            [type]="showNewPassword ? 'text' : 'password'"
            class="input"
            formControlName="newPassword"
            autocomplete="new-password"
          />
          <button type="button" class="toggle-password" (click)="showNewPassword = !showNewPassword">
            <lucide-icon [name]="showNewPassword ? 'eye-off' : 'eye'"></lucide-icon>
          </button>
        </div>
        <span class="form-error" *ngIf="newPasswordError">{{ newPasswordError }}</span>
      </div>

      <div class="form-field">
        <label class="form-label" for="confirm-password">Confirm Password</label>
        <div class="password-wrapper">
          <input
            id="confirm-password"
            [type]="showConfirmPassword ? 'text' : 'password'"
            class="input"
            formControlName="confirmPassword"
            autocomplete="new-password"
          />
          <button type="button" class="toggle-password" (click)="showConfirmPassword = !showConfirmPassword">
            <lucide-icon [name]="showConfirmPassword ? 'eye-off' : 'eye'"></lucide-icon>
          </button>
        </div>
        <span class="form-error" *ngIf="confirmPasswordError">{{ confirmPasswordError }}</span>
      </div>

      <button class="btn btn--primary" type="submit" [disabled]="loading">
        Reset Password
      </button>
      <span class="loading-text" *ngIf="loading">Resetting your password...</span>

      <div class="auth-inline">
        <span>Didn't receive the code?</span>
        <button
          class="link-button"
          type="button"
          [disabled]="!canResend"
          (click)="onResend()"
        >
          <ng-container *ngIf="cooldownSeconds === 0">Resend verification code</ng-container>
          <ng-container *ngIf="cooldownSeconds > 0">Wait {{ cooldownSeconds }}s to resend</ng-container>
        </button>
      </div>
      <span class="loading-text" *ngIf="resending">Sending a new code...</span>
    </form>
  </div>
</section>
