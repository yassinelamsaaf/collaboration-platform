<section class="auth-center">
  <div class="auth-card">
    <div class="auth-card__icon">
      <img src="/assets/images/icon-mail.png" alt="" />
    </div>
    <h1 class="auth-card__title">Reset your password</h1>
    <p class="auth-card__subtitle">
      Enter your email address and we'll send you a verification code to reset your password.
    </p>

    <form class="form-stack" [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-field">
        <label class="form-label" for="reset-email">Email Address</label>
        <div class="input-with-icon">
          <lucide-icon name="mail"></lucide-icon>
          <input
            id="reset-email"
            type="email"
            class="input"
            formControlName="email"
            autocomplete="email"
          />
        </div>
        <span class="form-error" *ngIf="emailError">{{ emailError }}</span>
      </div>

      <button class="btn btn--primary" type="submit" [disabled]="loading">
        Send Verification Code
      </button>
      <span class="loading-text" *ngIf="loading">Sending code...</span>
    </form>

    <div class="auth-card__footer">
      <a class="link auth-link-inline" routerLink="/auth/login">
        <lucide-icon name="arrow-left"></lucide-icon>
        Back to Login
      </a>
    </div>
  </div>
</section>
